# Adds python3 + gTTS to the single Railway service's Nixpacks build so
# src/lib/freeTTS.js's gTTS fallback (TTS_ENGINE=gtts) works without a
# separate tts-server. Rendering needs no extra system packages — FFmpeg
# ships as an npm dependency (ffmpeg-static) already resolved by `npm ci`.
[phases.setup]
nixPkgs = ["...", "python3", "python3Packages.pip"]

[phases.install]
# --break-system-packages is required here: Nix's python3Packages.pip
# refuses by default to write into the immutable /nix/store (PEP 668,
# "externally-managed-environment"). Safe in this throwaway build
# container — there's no shared system Python install to protect.
cmds = ["...", "pip install --break-system-packages gTTS"]
